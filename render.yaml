# render.yaml — Render Blueprint
# Deploys TWO services:
#   1. medicore-api   — Express server (keeps API key secret)
#   2. medicore-app   — React static site (the frontend)
#
# Setup:
#   1. Push this repo to GitHub
#   2. render.com → New → Blueprint → connect repo
#   3. Add ANTHROPIC_API_KEY to medicore-api environment variables
#   4. Copy the medicore-api URL → set as VITE_API_URL in medicore-app

services:
  # ── Backend: Express API server ──────────────────────────────
  - type: web
    name: medicore-api
    env: node
    region: oregon
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # You paste this in the Render dashboard
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        sync: false          # Paste your medicore-app URL here after first deploy
    headers:
      - path: /api/*
        name: Access-Control-Allow-Origin
        value: "*"

  # ── Frontend: React static site ──────────────────────────────
  - type: web
    name: medicore-app
    env: static
    region: oregon
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: true
    envVars:
      - key: VITE_API_URL
        sync: false          # Paste your medicore-api URL (e.g. https://medicore-api.onrender.com)
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
